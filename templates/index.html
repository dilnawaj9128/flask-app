<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Dark Aesthetic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent: #00f2fe;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a; /* Deep Navy Blue */
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { text-align: center; font-weight: 600; margin-bottom: 30px; color: var(--accent); }

        .input-group { margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }

        .list-container {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .student-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid var(--accent);
        }

        .course-tag { font-size: 0.8em; background: rgba(0, 242, 254, 0.1); padding: 2px 8px; border-radius: 5px; color: var(--accent); }

        /* Custom Scrollbar for the list */
        .scroll-area { max-height: 180px; overflow-y: auto; padding-right: 5px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Registry</h2>
    
    <form action="/submit" method="POST">
        <div class="input-group">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <input type="text" name="course" placeholder="Applied Course" required>
        </div>
        <button type="submit">Enroll Now</button>
    </form>

    <div class="list-container">
        <p style="font-size: 0.9em; opacity: 0.6; margin-bottom: 15px;">Recently Enrolled:</p>
        <div class="scroll-area">
            {% for s in students %}
                <div class="student-item">
                    <span>{{ s[0] }}</span>
                    <span class="course-tag">{{ s[1] }}</span>
                </div>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
