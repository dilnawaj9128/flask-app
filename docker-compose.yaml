version: "3.8"

services:

  flask-app:
    build: .
    container_name: flask_app
    ports:
      - "5000:5000"
    depends_on:
      - mysql-db
    volumes:
      - .:/app
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASSWORD=password123
      - DB_NAME=student_db

  mysql-db:
    image: mysql:5.7
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: student_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
